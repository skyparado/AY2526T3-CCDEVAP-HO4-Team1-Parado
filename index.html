<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusCart - CCDevAp[S15]</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

<link href="styles.css" rel="stylesheet" />
</head>
<body>
  <div class="container py-4">

    <header class="text-center mb-4">
      <h1 class="dashboard-title">CampusCart</h1>
      <p class="dashboard-subtitle">
        by <span>Sky Hannah Parado of S15 Team 1</span>
      </p>
    </header>

    <div class="row g-4">

      <div class="col-12 col-lg-4">
        <div class="card chart-card h-100">
          <div class="card-body">
            <h2 class="chart-heading">Top Sellers by Successful Claims</h2>
            <div class="chart-wrapper">
              <canvas id="topSellersChart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-4">
        <div class="card chart-card h-100">
          <div class="card-body">
            <h2 class="chart-heading">Average User Rating Distribution</h2>
            <div class="chart-wrapper">
              <canvas id="ratingChart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-4">
        <div class="card chart-card h-100">
          <div class="card-body">
            <h2 class="chart-heading">User Growth Over Time</h2>
            <div class="chart-wrapper">
              <canvas id="userGrowthChart"></canvas>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="charts.js"></script>
</body>
</html>
